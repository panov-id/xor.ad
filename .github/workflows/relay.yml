name: relay

# Test the node, then build + push the node/caddy images to ghcr with immutable
# tags: branch sha (dev iteration) and semver on a vX.Y.Z tag (release). No :latest.
on:
  push:
    branches: ["**"]
    tags: ["v*"]
    paths: ["relay/**", ".github/workflows/relay.yml"]
  pull_request:
    paths: ["relay/**", ".github/workflows/relay.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: unit tests
        working-directory: relay/node
        run: deno test
      - name: type check
        working-directory: relay/node
        run: deno check src/main.ts
      - name: integration (local stand)
        run: bash relay/test/integration.sh

  build-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [node, caddy]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/panov-id/relay-${{ matrix.image }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern=v{{version}}
      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: relay/${{ matrix.image }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
