name: _deploy (reusable)

# Shared deploy steps for one environment: build + push the panel to its CDN.
# The panel talks to the relay control-plane (VITE_RELAY_API_URL) — no Supabase.
# Called by deploy-dev/uat/prod; env-scoped secrets via the job's `environment:`.
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build panel
        working-directory: panel
        env:
          VITE_RELAY_API_URL: ${{ secrets.VITE_RELAY_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy panel to CDN
        env:
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_PANEL_STORAGE_ZONE }}
          BUNNY_STORAGE_API_KEY: ${{ secrets.BUNNY_PANEL_STORAGE_API_KEY }}
          BUNNY_PULL_ZONE_ID: ${{ secrets.BUNNY_PANEL_PULL_ZONE_ID }}
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: bash deploy/deploy-panel-ci.sh
