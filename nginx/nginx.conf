worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Local-dev stand-in for the xor.ad gateway: routes each face's
    # hostname to its static content, and proxies Supabase API paths
    # (shared backend behind both faces) to Kong.

    server {
        listen 80;
        server_name sosed.place;

        root /var/www/sosed.place;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location ~ ^/(auth|rest|realtime|storage|functions|graphql)/ {
            proxy_pass http://kong:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
        listen 80;
        server_name neighbro.place;

        root /var/www/neighbro.place;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location ~ ^/(auth|rest|realtime|storage|functions|graphql)/ {
            proxy_pass http://kong:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Fallback for local testing without editing /etc/hosts:
    # curl -H "Host: sosed.place" http://localhost:8080/
    server {
        listen 80 default_server;
        server_name _;
        return 404;
    }
}
