# Local stand — vжух: `docker compose up` and everything's here.
#   node    http://localhost:8081   the API (fs storage, mail -> Mailpit)
#   Mailpit http://localhost:8025   catches welcome emails
#   Dozzle  http://localhost:8090   live container logs in the browser
# Waitlist objects land in ./data/waitlist/local/*.json so you can eyeball them.
name: edge-node-local
services:
  node:
    build: { context: ../node }
    restart: unless-stopped
    depends_on: [mailpit]
    environment:
      NODE_ENV_NAME: local
      NODE_ID: local
      NODE_REGION: local
      ALLOWED_ORIGINS: ""          # empty -> reflect any origin (local convenience)
      STORAGE_TRANSPORT: fs
      STORAGE_DIR: /data
      MAIL_TRANSPORT: smtp
      MAIL_SMTP_HOST: mailpit
      MAIL_SMTP_PORT: "1025"
    volumes:
      - ./data:/data
    ports: ["8081:8080"]           # 8080 on the host is the xor.ad gateway

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports: ["8025:8025"]           # web UI (SMTP on 1025, internal)

  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    volumes: ["/var/run/docker.sock:/var/run/docker.sock:ro"]
    ports: ["8090:8080"]
